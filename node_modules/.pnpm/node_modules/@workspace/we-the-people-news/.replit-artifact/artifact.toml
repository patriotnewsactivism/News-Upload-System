kind = "web"
previewPath = "/"
title = "We The People News"
version = "1.0.0"
id = "artifacts/we-the-people-news"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26149
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/we-the-people-news run dev"

[services.env]
PORT = "26149"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/we-the-people-news", "run", "build"]
publicDir = "artifacts/we-the-people-news/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
